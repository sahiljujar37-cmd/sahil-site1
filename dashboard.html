<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gym Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Fitness Club</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Bookings</li>
      <li>Memberships</li>
      <li>Members</li>
      <li>Logout</li>
    </ul>
  </div>

  <div class="main">
    <h1>Dashboard</h1>

    <div class="cards">
      <div class="card">Bookings<br><span id="totalBookings">0</span></div>
      <div class="card">Members<br><span id="totalMembers">0</span></div>
      <div class="card">Pending<br><span id="pending">0</span></div>
      <div class="card">Active<br><span id="active">0</span></div>
    </div>

    <div class="section">
      <h2>Bookings</h2>
      <input id="bName" placeholder="Name">
      <input id="bService" placeholder="Service">
      <button onclick="addBooking()">Add</button>

      <table>
        <tbody id="bookingList"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Membership</h2>
      <input id="mName" placeholder="Name">
      <input id="mPlan" placeholder="Plan">
      <button onclick="addMember()">Add</button>

      <table>
        <tbody id="memberList"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
