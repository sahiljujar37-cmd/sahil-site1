<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Gym Admin</h2>
    <button onclick="showSection('home')">Dashboard</button>
    <button onclick="showSection('members')">Members</button>
    <button onclick="showSection('booking')">Bookings</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HOME -->
    <div id="home">
      <h2>Dashboard</h2>

      <div class="cards">
        <div class="card">Total: <span id="totalMembers">0</span></div>
        <div class="card">Revenue: ₹<span id="revenue">0</span></div>
      </div>

      <canvas id="chart"></canvas>
    </div>

    <!-- MEMBERS -->
    <div id="members" style="display:none;">
      <h2>Members</h2>

      <input id="search" placeholder="Search..." onkeyup="searchMember()">

      <input id="name" placeholder="Name">
      <input id="fee" placeholder="Fee">
      <input id="plan" placeholder="Plan">
      <button onclick="addMember()">Add</button>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Fee</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>

    <!-- BOOKINGS -->
    <div id="booking" style="display:none;">
      <h2>Bookings</h2>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Date</th>
            <th>Slot</th>
          </tr>
        </thead>
        <tbody id="bookingTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
