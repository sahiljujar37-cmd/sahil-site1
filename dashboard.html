<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
</head>

<body>

<h2>Admin Dashboard</h2>

<!-- NAVIGATION -->
<button onclick="showSection('booking')">Bookings</button>
<button onclick="showSection('members')">Members</button>

<!-- ================= BOOKING SECTION ================= -->
<div id="booking">
  <h3>Bookings</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Service</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>
</div>

<!-- ================= MEMBERS SECTION ================= -->
<div id="members" style="display:none;">
  <h3>Members</h3>

  <!-- ADD MEMBER -->
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="fee" placeholder="Fee">
  <button onclick="addMember()">Add Member</button>

  <h4>Total Members: <span id="totalMembers">0</span></h4>
  <h4>Total Revenue: ₹<span id="revenue">0</span></h4>

  <table border="1">
    <thead>
      <tr>
        <th>Name</th>
        <th>Fee</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="memberTable"></tbody>
  </table>
</div>

<script src="dashboard.js"></script>

</body>
</html>
