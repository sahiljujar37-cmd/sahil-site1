<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zunjar Club Dashboard</title>
</head>
<body>

<h1>ZUNJAR CLUB DASHBOARD</h1>

<!-- Stats -->
<h3>Total Bookings: <span id="totalBookings">0</span></h3>
<h3>Total Members: <span id="totalMembers">0</span></h3>

<hr>

<!-- BOOKINGS -->
<h2>Bookings</h2>
<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Service</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="bookingList"></tbody>
</table>

<hr>

<!-- MEMBERS -->
<h2>Members</h2>
<table border="1">
  <thead>
    <tr>
      <th>Name</th>
      <th>Plan</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="memberList"></tbody>
</table>

<script src="dashboard.js"></script>
</body>
</html>
