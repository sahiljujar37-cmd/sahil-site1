
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Admin Dashboard</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="loginPage" class="login-box">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none; width:100%;">

  <div class="sidebar">
    <h2>Gym Admin</h2>
    <button onclick="showSection('home')">Dashboard</button>
    <button onclick="showSection('members')">Members</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Dashboard</h1>
    </div>

    <div id="home">
      <div class="cards">
        <div class="card">
          <h3>Total Members</h3>
          <p id="totalMembers">0</p>
        </div>
        <div class="card">
          <h3>Revenue</h3>
          <p id="revenue">₹0</p>
        </div>
      </div>

      <canvas id="chart" style="margin-top:30px;"></canvas>
    </div>

    <div id="members" style="display:none;">
      <h2>Members</h2>

      <input id="name" placeholder="Name" />
      <input id="fee" placeholder="Fee" type="number" />
      <button onclick="addMember()">Add</button>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Fee</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
