<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Admin Dashboard</title>
<link rel="stylesheet" href="dashboard.css">

<!-- IMPORTANT: defer fixes loading issues -->
<script src="dashboard.js" defer></script>
</head>

<body>

<!-- LOADER -->
<div id="loader" class="loader" style="display:none;">Loading...</div>

<!-- POPUP -->
<div id="popup" class="popup" style="display:none;"></div>

<!-- HEADER -->
<div class="header">
    <h1>🏋️ Admin Dashboard</h1>
    <button onclick="logout()">Logout</button>
</div>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Total Members</h3>
        <span id="totalMembers">0</span>
    </div>

    <div class="card">
        <h3>Active Members</h3>
        <span id="activeMembers">0</span>
    </div>

    <div class="card">
        <h3>Bookings</h3>
        <span id="totalBookings">0</span>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        ₹<span id="revenue">0</span>
    </div>
</div>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search member..." onkeyup="searchMember()">

<!-- BOOKINGS TABLE -->
<h2>Bookings</h2>
<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Service</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="bookingTable"></tbody>
</table>

<!-- MEMBERS TABLE -->
<h2>Memberships</h2>
<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Plan</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="membershipTable"></tbody>
</table>

</body>
</html>
